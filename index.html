<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ELMA Sandbox</title>

<style>

*{
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    margin:0;
    background:#f4f7fb;
}

header{
    background:#0d47a1;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.editor-panel{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.editor{
    background:white;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.editor h3{
    margin-top:0;
}

textarea{
    width:100%;
    height:180px;
    resize:vertical;
    font-family:Consolas, monospace;
    font-size:14px;
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1976d2;
    color:white;
}

button:hover{
    background:#0d47a1;
}

.preview{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.preview h3{
    margin:0;
    padding:10px;
    background:#eee;
}

iframe{
    width:100%;
    height:800px;
    border:none;
}

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

iframe{
    height:500px;
}

}

</style>
</head>
<body>

<header>
<h1>⚡ ELMA Sandbox</h1>
<p>Paste HTML, CSS, dan JavaScript lalu jalankan</p>
</header>

<div class="container">

<div class="editor-panel">

<div class="editor">
<h3>HTML</h3>
<textarea id="html">
<h1>Hello Physics!</h1>
<p>Ini preview simulasi.</p>
</textarea>
</div>

<div class="editor">
<h3>CSS</h3>
<textarea id="css">
h1{
color:red;
text-align:center;
}
</textarea>
</div>

<div class="editor">
<h3>JavaScript</h3>
<textarea id="js">
console.log("ELMA Sandbox Ready");
</textarea>
</div>

<div class="buttons">
<button onclick="runCode()">▶ Jalankan</button>
<button onclick="resetCode()">↺ Reset</button>
</div>

</div>

<div class="preview">

<h3>Preview</h3>

<iframe id="preview"></iframe>

</div>

</div>

<script>

function runCode(){

const html =
document.getElementById("html").value;

const css =
document.getElementById("css").value;

const js =
document.getElementById("js").value;

const iframe =
document.getElementById("preview");

const doc =
iframe.contentWindow.document;

doc.open();

doc.write(`
<!DOCTYPE html>
<html>
<head>

<style>
${css}
</style>

</head>

<body>

${html}

<script>
${js}
<\/script>

</body>
</html>
`);

doc.close();

}

function resetCode(){

document.getElementById("html").value="";
document.getElementById("css").value="";
document.getElementById("js").value="";

runCode();

}

runCode();

</script>

</body>
</html>
